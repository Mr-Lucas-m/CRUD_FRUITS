services:

  db:
    image: postgres:16-alpine
    container_name: fruits_db
    restart: always
    environment:
      POSTGRES_USER: fruits_user
      POSTGRES_PASSWORD: fruits_pass
      POSTGRES_DB: fruits_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fruits_user -d fruits_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fruits_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data: